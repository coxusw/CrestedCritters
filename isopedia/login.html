<!DOCTYPE html>
<html lang="en">
<head>
<title>Log In | Isopedia</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="assets/style.css">
<script defer src="assets/config.js"></script>
<script defer src="assets/api.js"></script>
<script defer src="assets/app.js"></script>
</head>
<body data-page="login">
<header class="site-header">
  <div class="site-shell nav">
    <a class="brand" href="index.html">
      <span class="brand-mark">ISO</span>
      <span>Isopedia</span>
    </a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="contribute.html">Add an Isopod</a>
      <a id="verifyLink" href="verify.html" hidden>Verify</a>
      <a href="faq.html">FAQ</a>
      <a href="donate.html">Donate</a>
      <a id="accountLink" href="login.html">Account</a>
      <a id="loginLink" href="login.html">Log In</a>
    </nav>
  </div>
</header>

<main class="site-shell main">
  <section class="form-card">
    <h1>Log In</h1>
    <p class="muted">Log in to add isopods, verify contributions, or dispute information.</p>

    <p id="formNotice" class="notice" hidden></p>

    <form id="loginForm" class="form-grid">
      <label>
        Username
        <input name="username" type="text" required autocomplete="username">
      </label>

      <label>
        Password
        <input name="password" type="password" required autocomplete="current-password">
      </label>

      <button class="button primary" type="submit">Log In</button>
    </form>

    <p>Need an account? <a href="register.html">Register here</a>.</p>
  </section>
</main>

<footer class="footer">
  <div class="site-shell">
    <p>Isopedia is a community-built isopod knowledge project by Crested Critters.</p>
  </div>
</footer>
</body>
</html>
